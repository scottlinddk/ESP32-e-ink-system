[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    zinggjm/GxEPD2@^1.5.3
    bblanchon/ArduinoJson@^7.0.0
    httpclient
    esp_https_ota

build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D DEBUG_ESP_PORT=Serial

extra_scripts =
    pre:scripts/version_check.py
