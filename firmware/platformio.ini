[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    zinggjm/GxEPD2@^1.5.3
    bblanchon/ArduinoJson@^7.0.0
    httpclient
    esp_https_ota
    esphome/ESPAsyncWebServer-esphome@^3.1.0
    esphome/AsyncTCP-esphome@^2.1.0

build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D DEBUG_ESP_PORT=Serial

extra_scripts =
    pre:scripts/version_check.py

; ──────────────────────────────────────────────────────────────────────────────
; Elecrow CrowPanel ESP32 2.13" E-Paper (ESP32-S3, SSD1680Z/JD79661)
; Requires: firmware/lib/EPD/ — copy from Elecrow GitHub repo factory_sourcecode
; ──────────────────────────────────────────────────────────────────────────────
[env:elecrow_213]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 460800

board_build.arduino.memory_type = qio_opi
board_build.partitions = huge_app.csv

lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    httpclient
    esp_https_ota
    esphome/ESPAsyncWebServer-esphome@^3.1.0
    esphome/AsyncTCP-esphome@^2.1.0

build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D DEBUG_ESP_PORT=Serial
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ELECROW_EPAPER_213
    -I lib/EPD
    -I lib/EPD/src

extra_scripts =
    pre:scripts/version_check.py
