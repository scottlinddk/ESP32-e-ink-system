name: Update database types

on:
  schedule:
    # Runs daily at midnight UTC. Adjust to run more or less frequently.
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: wormvwlzppaifrngughw
    steps:
      - name: Check for Supabase access token
        id: check_token
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN secret is not set — skipping type generation."
            echo "To enable: create a token at https://supabase.com/dashboard/account/tokens"
            echo "and add it as SUPABASE_ACCESS_TOKEN in repository secrets."
            echo "has_token=false" >> $GITHUB_OUTPUT
          else
            echo "has_token=true" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v4
        if: steps.check_token.outputs.has_token == 'true'
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-node@v4
        if: steps.check_token.outputs.has_token == 'true'
        with:
          node-version: 22
      - if: steps.check_token.outputs.has_token == 'true'
        run: npm ci
      - if: steps.check_token.outputs.has_token == 'true'
        run: npm run gen:types -w backend
      - name: check for file changes
        id: git_status
        if: steps.check_token.outputs.has_token == 'true'
        run: |
          echo "status=$(git status -s)" >> $GITHUB_OUTPUT
      - name: Commit files
        if: steps.check_token.outputs.has_token == 'true' && contains(steps.git_status.outputs.status, ' ')
        run: |
          git add backend/src/types/database.ts
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "Update database types"
      - name: Push changes
        if: steps.check_token.outputs.has_token == 'true' && contains(steps.git_status.outputs.status, ' ')
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
