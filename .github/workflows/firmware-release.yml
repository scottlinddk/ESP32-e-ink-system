name: Build and Release Firmware

on:
  push:
    branches: [main]
    paths: ['firmware/**']
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. 1.2.3)'
        required: false
        default: 'dev'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install platformio

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAG_NAME="${GITHUB_REF_NAME}"
            IS_PRERELEASE="false"
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            SHORT_SHA="${GITHUB_SHA::7}"
            DATE=$(date +%Y%m%d)
            VERSION="dev-${DATE}-${SHORT_SHA}"
            TAG_NAME="dev-${DATE}-${SHORT_SHA}"
            IS_PRERELEASE="true"
          else
            VERSION="${{ github.event.inputs.version || 'dev' }}"
            TAG_NAME=""
            IS_PRERELEASE="false"
          fi
          echo "VERSION=${VERSION}"             >> "$GITHUB_OUTPUT"
          echo "TAG_NAME=${TAG_NAME}"           >> "$GITHUB_OUTPUT"
          echo "IS_PRERELEASE=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Generate config.h from example
        working-directory: firmware
        env:
          PRODUCTION_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          # Place config.h in src/ so the same-directory include search finds it
          # before any identically-named headers from the ESP32 framework (e.g. mbedTLS).
          cp config.h.example src/config.h
          # Inject runtime API URL (overrides the default placeholder)
          sed -i "s|https://your-api.vercel.app|${PRODUCTION_API_URL}|g" src/config.h
          # Inject version
          sed -i "s|#define FIRMWARE_VERSION \"1.0.0\"|#define FIRMWARE_VERSION \"${VERSION}\"|" src/config.h

      - name: Build Waveshare firmware (ESP32)
        working-directory: firmware
        run: |
          pio run -e esp32dev

      - name: Copy Waveshare firmware binaries
        run: |
          cp firmware/.pio/build/esp32dev/firmware.bin    firmware.bin
          cp firmware/.pio/build/esp32dev/bootloader.bin  bootloader.bin
          cp firmware/.pio/build/esp32dev/partitions.bin  partitions.bin
          echo "App:         $(du -sh firmware.bin)"
          echo "Bootloader:  $(du -sh bootloader.bin)"
          echo "Partitions:  $(du -sh partitions.bin)"

      - name: Fetch Elecrow EPD library
        working-directory: firmware
        run: |
          git clone --depth=1 https://github.com/Elecrow-RD/CrowPanel-ESP32-2.13-E-paper-HMI-Display-with-122-250 /tmp/elecrow-repo
          EPD_DIR=$(find /tmp/elecrow-repo -type d -name "EPD" | head -1)
          if [ -z "$EPD_DIR" ]; then
            echo "ERROR: Could not find EPD directory in Elecrow repo"
            exit 1
          fi
          mkdir -p lib
          cp -r "$EPD_DIR" lib/EPD
          echo "Copied EPD library from: $EPD_DIR"

          # Fonts/ may live outside the EPD directory and may be lowercase on some
          # repo versions. Use case-insensitive search across the full repo tree.
          FONTS_DIR=$(find /tmp/elecrow-repo -type d -iname "Fonts" | head -1)
          if [ -z "$FONTS_DIR" ]; then
            echo "WARNING: No Fonts directory found in Elecrow repo — font declarations come from GUI_Paint.h"
          else
            # Copy into lib/EPD/ so "-I lib/EPD" makes #include "Fonts/fonts.h" resolvable.
            cp -r "$FONTS_DIR" lib/EPD/Fonts
            # Mirror into src/ as well for any header resolved via "-I lib/EPD/src".
            # The Elecrow EPD library puts files directly in its root (no src/ subdir),
            # so we must create the directory before copying.
            mkdir -p lib/EPD/src
            cp -r "$FONTS_DIR" lib/EPD/src/Fonts
            echo "Copied Fonts from: $FONTS_DIR"
          fi

          # Fix the malformed include guard in EPD.h — "#ifndef __utility/EPD_H_"
          # contains a slash which is not a valid preprocessor token character.
          # Replace it with a conventional guard name to eliminate the warnings.
          EPD_H="lib/EPD/src/EPD.h"
          if [ -f "$EPD_H" ]; then
            sed -i 's|#ifndef __utility/EPD_H_|#ifndef __UTILITY_EPD_H_|g' "$EPD_H"
            sed -i 's|#define __utility/EPD_H_|#define __UTILITY_EPD_H_|g' "$EPD_H"
            echo "Patched include guard in $EPD_H"
          fi

          echo "EPD library structure:"
          find lib/EPD -type f | sort

      - name: Build Elecrow firmware (ESP32-S3)
        working-directory: firmware
        run: |
          pio run -e elecrow_213

      - name: Copy Elecrow firmware binaries
        run: |
          cp firmware/.pio/build/elecrow_213/firmware.bin    firmware-elecrow.bin
          cp firmware/.pio/build/elecrow_213/bootloader.bin  bootloader-elecrow.bin
          cp firmware/.pio/build/elecrow_213/partitions.bin  partitions-elecrow.bin
          echo "Elecrow App:        $(du -sh firmware-elecrow.bin)"
          echo "Elecrow Bootloader: $(du -sh bootloader-elecrow.bin)"
          echo "Elecrow Partitions: $(du -sh partitions-elecrow.bin)"

      - name: Generate flash manifest
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cat > manifest.json <<EOF
          {
            "name": "ESP32 Display v${VERSION}",
            "builds": [
              {
                "chipFamily": "ESP32",
                "parts": [
                  { "path": "bootloader.bin", "offset": 4096 },
                  { "path": "partitions.bin", "offset": 32768 },
                  { "path": "firmware.bin",   "offset": 65536 }
                ]
              },
              {
                "chipFamily": "ESP32-S3",
                "parts": [
                  { "path": "bootloader-elecrow.bin", "offset": 0 },
                  { "path": "partitions-elecrow.bin", "offset": 32768 },
                  { "path": "firmware-elecrow.bin",   "offset": 65536 }
                ]
              }
            ]
          }
          EOF

      - name: Create GitHub Release and upload binaries
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        with:
          tag_name: ${{ steps.version.outputs.TAG_NAME }}
          name: >-
            ${{ steps.version.outputs.IS_PRERELEASE == 'true'
                && format('Dev Build {0}', steps.version.outputs.VERSION)
                || format('Release v{0}', steps.version.outputs.VERSION) }}
          prerelease: ${{ steps.version.outputs.IS_PRERELEASE == 'true' }}
          generate_release_notes: ${{ steps.version.outputs.IS_PRERELEASE == 'false' }}
          files: |
            firmware.bin
            bootloader.bin
            partitions.bin
            firmware-elecrow.bin
            bootloader-elecrow.bin
            partitions-elecrow.bin
            manifest.json
          body: |
            ## Flashing

            **Browser (USB):** Use the Firmware page — the default firmware is updated automatically.
            Both the Waveshare (ESP32) and Elecrow CrowPanel (ESP32-S3) boards are supported.

            **CLI (Waveshare):** `cd firmware && pio run -e esp32dev --target upload`

            **CLI (Elecrow):** `cd firmware && pio run -e elecrow_213 --target upload`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload binaries as artifact (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.version.outputs.VERSION }}
          path: |
            firmware.bin
            bootloader.bin
            partitions.bin
            firmware-elecrow.bin
            bootloader-elecrow.bin
            partitions-elecrow.bin
            manifest.json
          retention-days: 30
