name: Build and Release Firmware

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. 1.2.3)'
        required: false
        default: 'dev'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install platformio

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version || 'dev' }}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate config.h from example
        working-directory: firmware
        env:
          PRODUCTION_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          cp config.h.example config.h
          # Inject runtime API URL (overrides the default placeholder)
          sed -i "s|https://your-api.vercel.app|${PRODUCTION_API_URL}|g" config.h
          # Inject version
          sed -i "s|#define FIRMWARE_VERSION \"1.0.0\"|#define FIRMWARE_VERSION \"${VERSION}\"|" config.h

      - name: Build firmware
        working-directory: firmware
        env:
          PRODUCTION_API_URL: ${{ secrets.PRODUCTION_API_URL }}
        run: |
          pio run -e esp32dev \
            --project-option="build_flags=-D CORE_DEBUG_LEVEL=3 -D DEBUG_ESP_PORT=Serial -D PROVISION_DEFAULT_API_URL='\"${PRODUCTION_API_URL}\"'"

      - name: Copy firmware binary
        run: |
          cp firmware/.pio/build/esp32dev/firmware.bin firmware.bin
          echo "Binary size: $(du -sh firmware.bin)"

      - name: Create GitHub Release and upload binary
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: firmware.bin
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload binary as artifact (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.version.outputs.VERSION }}
          path: firmware.bin
          retention-days: 30
